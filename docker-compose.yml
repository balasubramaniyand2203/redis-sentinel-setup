version: "3.9"

services:
  redis-master:
    image: redis/redis-stack:latest
    container_name: redis-master
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - ./data/master:/data
      - ./redis-master.conf:/usr/local/etc/redis/redis.conf
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    networks:
      - redisnet

  redis-replica:
    image: redis/redis-stack:latest
    container_name: redis-replica
    restart: always
    depends_on:
      - redis-master
    ports:
      - "6380:6379"
    volumes:
      - ./data/replica:/data
      - ./redis-replica.conf:/usr/local/etc/redis/redis.conf
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    networks:
      - redisnet

  sentinel1:
    image: redis:7.2
    container_name: sentinel1
    restart: always
    depends_on:
      - redis-master
      - redis-replica
    ports:
      - "26379:26379"
    volumes:
      - ./sentinel1.conf:/usr/local/etc/redis/sentinel.conf
    command: ["redis-server", "/usr/local/etc/redis/sentinel.conf", "--sentinel"]
    networks:
      - redisnet

  sentinel2:
    image: redis:7.2
    container_name: sentinel2
    restart: always
    depends_on:
      - redis-master
      - redis-replica
    ports:
      - "26380:26379"
    volumes:
      - ./sentinel2.conf:/usr/local/etc/redis/sentinel.conf
    command: ["redis-server", "/usr/local/etc/redis/sentinel.conf", "--sentinel"]
    networks:
      - redisnet

  sentinel3:
    image: redis:7.2
    container_name: sentinel3
    restart: always
    depends_on:
      - redis-master
      - redis-replica
    ports:
      - "26381:26379"
    volumes:
      - ./sentinel3.conf:/usr/local/etc/redis/sentinel.conf
    command: ["redis-server", "/usr/local/etc/redis/sentinel.conf", "--sentinel"]
    networks:
      - redisnet

networks:
  redisnet:
    driver: bridge
